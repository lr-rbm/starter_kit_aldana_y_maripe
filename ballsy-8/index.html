<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, height=600, initial-scale=1" />
  <title>Ballsy 8</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <div class="plate">
      <div class="ball" id="ball">
        <div class="ball-fill"></div>
        <div class="window">
          <div class="triangle">
            <p class="answer eight" id="answer">8</p>
          </div>
        </div>
      </div>
      <p class="caption" id="caption"></p>
      <p class="hint" id="hint">Press Enter to ask</p>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
