<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>Launcher</title>
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #0a0a0f;
      --bg-tertiary: #1e1e2e;
      --bg-card: #1a1a2e;
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --text-muted: #606070;
      --accent: #00d4ff;
      --accent-glow: rgba(0, 212, 255, 0.4);
      --success: #00ff88;
      --radius-md: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 600px;
      height: 600px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    header {
      padding: 24px 32px 16px;
      background: var(--bg-secondary);
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
    }
    .hint {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .target {
      margin-top: 10px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--accent);
      word-break: break-all;
    }
    .target-label {
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 10px;
      margin-right: 6px;
    }
    .list {
      flex: 1;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }
    .focusable {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 2px solid transparent;
      border-radius: var(--radius-md);
      font-size: 17px;
      font-weight: 500;
      min-height: 44px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s ease;
      font-family: inherit;
    }
    .focusable:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
      background: var(--bg-card);
    }
    .icon {
      font-size: 24px;
      width: 32px;
      text-align: center;
    }
    .label {
      flex: 1;
    }
    .arrow {
      color: var(--accent);
      font-size: 20px;
    }
  </style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="be32beae-a2a9-423f-b55d-e646ec260f93"></script>
</head>
<body>
  <header>
    <h1>Launcher</h1>
    <div class="hint">Deep-link into a separately hosted app</div>
    <div class="target">
      <span class="target-label">Target</span><span id="target-display"></span>
    </div>
  </header>
  <div class="list" id="list">
    <button class="focusable" data-screen="home">
      <span class="icon">&#9632;</span><span class="label">Open Home</span><span class="arrow">&rsaquo;</span>
    </button>
    <button class="focusable" data-screen="settings">
      <span class="icon">&#9881;</span><span class="label">Open Settings</span><span class="arrow">&rsaquo;</span>
    </button>
    <button class="focusable" data-screen="profile">
      <span class="icon">&#9679;</span><span class="label">Open Profile</span><span class="arrow">&rsaquo;</span>
    </button>
    <button class="focusable" data-screen="about">
      <span class="icon">&#8505;</span><span class="label">Open About</span><span class="arrow">&rsaquo;</span>
    </button>
  </div>
  <script>
    const DEFAULT_TARGET = 'http://localhost:8081/';
    const STORAGE_KEY = 'deeplink:target';

    const qs = new URLSearchParams(location.search);
    const override = qs.get('target');
    if (override) {
      localStorage.setItem(STORAGE_KEY, override);
      history.replaceState({}, '', location.pathname);
    }
    const target = localStorage.getItem(STORAGE_KEY) || DEFAULT_TARGET;
    document.getElementById('target-display').textContent = target;

    function openScreen(screen) {
      const url = new URL(target);
      url.searchParams.set('screen', screen);
      window.location.href = url.toString();
    }

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-screen]');
      if (btn) openScreen(btn.dataset.screen);
    });

    function visibleFocusables() {
      return Array.from(document.querySelectorAll('.focusable')).filter(el => el.offsetParent !== null);
    }

    document.addEventListener('keydown', (e) => {
      const items = visibleFocusables();
      if (items.length === 0) return;
      const idx = items.indexOf(document.activeElement);
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        e.preventDefault();
        items[(idx + 1 + items.length) % items.length].focus();
      } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        e.preventDefault();
        items[(idx - 1 + items.length) % items.length].focus();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (document.activeElement && document.activeElement.click) {
          document.activeElement.click();
        }
      }
    });

    const first = document.querySelector('.focusable');
    if (first) first.focus();
  </script>
</body>
</html>
