<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>Device Info</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
<script defer src="https://cloud.umami.is/script.js" data-website-id="be32beae-a2a9-423f-b55d-e646ec260f93"></script>
</head>
<body>
  <div id="app">

    <!-- Home / Category Menu -->
    <section id="home" class="screen">
      <header class="header">
        <h1>Device Info</h1>
        <span class="header-meta mono" id="home-time"></span>
      </header>
      <div class="content">
        <button class="menu-item focusable" data-action="go-screen" data-target="browser">
          <span class="menu-icon">&#127760;</span>
          <span class="menu-label">Browser</span>
          <span class="menu-chevron">&#8250;</span>
        </button>
        <button class="menu-item focusable" data-action="go-screen" data-target="useragent">
          <span class="menu-icon">&#128196;</span>
          <span class="menu-label">User Agent</span>
          <span class="menu-chevron">&#8250;</span>
        </button>
        <button class="menu-item focusable" data-action="go-screen" data-target="screen-info">
          <span class="menu-icon">&#128444;</span>
          <span class="menu-label">Screen &amp; Display</span>
          <span class="menu-chevron">&#8250;</span>
        </button>
        <button class="menu-item focusable" data-action="go-screen" data-target="network">
          <span class="menu-icon">&#128246;</span>
          <span class="menu-label">Network</span>
          <span class="menu-chevron">&#8250;</span>
        </button>
        <button class="menu-item focusable" data-action="go-screen" data-target="hardware">
          <span class="menu-icon">&#128187;</span>
          <span class="menu-label">Hardware</span>
          <span class="menu-chevron">&#8250;</span>
        </button>
        <button class="menu-item focusable" data-action="go-screen" data-target="performance">
          <span class="menu-icon">&#9201;</span>
          <span class="menu-label">Performance</span>
          <span class="menu-chevron">&#8250;</span>
        </button>
        <button class="menu-item focusable" data-action="go-screen" data-target="apis">
          <span class="menu-icon">&#128273;</span>
          <span class="menu-label">APIs &amp; Features</span>
          <span class="menu-chevron">&#8250;</span>
        </button>
        <button class="menu-item focusable" data-action="go-screen" data-target="location">
          <span class="menu-icon">&#128205;</span>
          <span class="menu-label">Location</span>
          <span class="menu-chevron">&#8250;</span>
        </button>
      </div>
    </section>

    <!-- Browser -->
    <section id="browser" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1>Browser</h1>
      </header>
      <div class="content" id="browser-content"></div>
    </section>

    <!-- User Agent -->
    <section id="useragent" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1>User Agent</h1>
      </header>
      <div class="content" id="useragent-content"></div>
    </section>

    <!-- Screen & Display -->
    <section id="screen-info" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1>Screen &amp; Display</h1>
      </header>
      <div class="content" id="screen-info-content"></div>
    </section>

    <!-- Network -->
    <section id="network" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1>Network</h1>
      </header>
      <div class="content" id="network-content"></div>
    </section>

    <!-- Hardware -->
    <section id="hardware" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1>Hardware</h1>
      </header>
      <div class="content" id="hardware-content"></div>
    </section>

    <!-- Performance -->
    <section id="performance" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1>Performance</h1>
      </header>
      <div class="content" id="performance-content"></div>
    </section>

    <!-- APIs & Features -->
    <section id="apis" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1>APIs &amp; Features</h1>
      </header>
      <div class="content" id="apis-content"></div>
    </section>

    <!-- Location -->
    <section id="location" class="screen hidden">
      <header class="header">
        <button class="back-btn focusable" data-action="back">&#8592;</button>
        <h1>Location</h1>
      </header>
      <div class="content" id="location-content"></div>
      <nav class="nav-bar">
        <button class="nav-item primary focusable" data-action="fetch-location">&#128205; Get Location</button>
      </nav>
    </section>

  </div>
  <script src="app.js"></script>
</body>
</html>
