<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="visor" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#28456e"/>
      <stop offset="55%" stop-color="#16263f"/>
      <stop offset="100%" stop-color="#0b1626"/>
    </radialGradient>
    <linearGradient id="helmet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cfd6e4"/>
    </linearGradient>
  </defs>

  <!-- helmet shell -->
  <circle cx="50" cy="48" r="34" fill="url(#helmet)"/>
  <circle cx="50" cy="48" r="34" fill="none" stroke="#aab3c6" stroke-width="2"/>

  <!-- visor -->
  <ellipse cx="50" cy="49" rx="24" ry="25" fill="url(#visor)"/>

  <!-- glossy reflection sweeping across the visor -->
  <path d="M36 34 q10 -8 22 -3 q-14 4 -20 20 q-5 -9 -2 -17 z" fill="#5e8fd6" opacity="0.55"/>
  <circle cx="40" cy="60" r="3" fill="#7fa8e6" opacity="0.5"/>

  <!-- little star, top-right -->
  <path d="M82 20 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2 z" fill="#6ea8ff"/>
</svg>
