<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, height=600" />
  <title>Key Logger</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 600px;
      height: 600px;
      background: #000000;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    #stage {
      position: relative;
      width: 600px;
      height: 600px;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 600px;
      height: 600px;
      display: block;
    }

    .ui {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: 36px 1fr auto 36px;
      pointer-events: none;
    }

    #top {
      align-self: center;
      justify-self: center;
      font-size: 11px;
      letter-spacing: 5px;
      opacity: 0.35;
      text-transform: uppercase;
    }

    #key {
      align-self: center;
      justify-self: center;
      font-size: 320px;
      font-weight: 700;
      line-height: 0.9;
      text-align: center;
      transform-origin: center center;
      transition: transform 90ms cubic-bezier(.2, .9, .25, 1.4);
      text-shadow: 0 0 40px currentColor;
      will-change: transform;
    }

    #key.idle {
      font-size: 22px;
      letter-spacing: 6px;
      opacity: 0.35;
      font-weight: 300;
      text-transform: uppercase;
      text-shadow: none;
      color: #FFFFFF;
    }

    #meta {
      align-self: center;
      justify-self: center;
      font-size: 22px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 3px;
      opacity: 0.92;
      text-transform: uppercase;
      min-height: 28px;
      text-align: center;
      padding-bottom: 24px;
    }

    #meta .multi {
      color: #FFC857;
      font-weight: 700;
    }

    #meta .hold {
      color: #B388FF;
      font-weight: 700;
    }

    #hint {
      align-self: center;
      justify-self: center;
      font-size: 10px;
      opacity: 0.28;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
  </style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="be32beae-a2a9-423f-b55d-e646ec260f93"></script>
</head>
<body>
  <div id="stage">
    <canvas id="canvas" width="1200" height="1200"></canvas>
    <div class="ui">
      <div id="top">key logger</div>
      <div id="key" class="idle">arrows · enter</div>
      <div id="meta">&nbsp;</div>
      <div id="hint">tap · double · triple · hold</div>
    </div>
  </div>

  <script>
    (function () {
      // ───── Key map ──────────────────────────────────────────
      const KEYS = {
        ArrowUp:    { glyph: '↑', dx:  0, dy: -1, hue: 190, freq: 784 }, // G5
        ArrowDown:  { glyph: '↓', dx:  0, dy:  1, hue: 340, freq: 330 }, // E4
        ArrowLeft:  { glyph: '←', dx: -1, dy:  0, hue:  45, freq: 440 }, // A4
        ArrowRight: { glyph: '→', dx:  1, dy:  0, hue: 130, freq: 587 }, // D5
        Enter:      { glyph: '⏎', dx:  0, dy:  0, hue: 270, freq: 261 }, // C4
      };

      // ───── DOM ──────────────────────────────────────────────
      const keyEl  = document.getElementById('key');
      const metaEl = document.getElementById('meta');

      // ───── Canvas setup (retina-crisp via 2× backing) ───────
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      ctx.scale(2, 2); // work in 600×600 logical units

      // ───── Tap-chain detection ──────────────────────────────
      let lastKey = null;
      let lastTapTime = 0;
      let tapChain = 0;
      const CHAIN_WINDOW = 380; // ms
      let chainResetTimer = null;

      function tapChainFor(key) {
        const now = performance.now();
        if (key === lastKey && now - lastTapTime < CHAIN_WINDOW) {
          tapChain += 1;
        } else {
          tapChain = 1;
        }
        lastKey = key;
        lastTapTime = now;
        clearTimeout(chainResetTimer);
        chainResetTimer = setTimeout(() => { tapChain = 0; lastKey = null; }, CHAIN_WINDOW + 50);
        return tapChain;
      }

      // ───── Audio ────────────────────────────────────────────
      let ac = null;
      function audio() {
        if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
        if (ac.state === 'suspended') ac.resume();
        return ac;
      }

      function blip(freq, dur, type, vol, when) {
        const a = audio();
        const t0 = (when ?? a.currentTime);
        const o = a.createOscillator();
        const g = a.createGain();
        o.type = type || 'sine';
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(vol ?? 0.18, t0 + 0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        o.connect(g).connect(a.destination);
        o.start(t0);
        o.stop(t0 + dur + 0.05);
      }

      function chord(base, count) {
        const a = audio();
        const ratios = [1, 1.5, 2, 2.5, 3]; // root, fifth, octave, +third, +fifth
        for (let i = 0; i < count; i++) {
          const r = ratios[Math.min(i, ratios.length - 1)];
          const t = a.currentTime + i * 0.055;
          blip(base * r,       0.22 - i * 0.02, 'sine',     0.16, t);
          blip(base * r * 2,   0.10,            'triangle', 0.04, t);
        }
      }

      // sustained pad while Enter is held
      let padOsc = null, padGain = null, padFilter = null, padLfo = null;
      function startPad(hue) {
        const a = audio();
        stopPad(0.05);
        padOsc = a.createOscillator();
        const padOsc2 = a.createOscillator();
        padGain = a.createGain();
        padFilter = a.createBiquadFilter();
        padLfo = a.createOscillator();
        const lfoGain = a.createGain();

        padOsc.type = 'sawtooth';
        padOsc.frequency.value = 110;
        padOsc2.type = 'sawtooth';
        padOsc2.frequency.value = 110 * 1.005; // detune

        padFilter.type = 'lowpass';
        padFilter.frequency.value = 380;
        padFilter.Q.value = 6;

        padLfo.type = 'sine';
        padLfo.frequency.value = 4.5;
        lfoGain.gain.value = 180;
        padLfo.connect(lfoGain).connect(padFilter.frequency);

        padGain.gain.setValueAtTime(0, a.currentTime);
        padGain.gain.linearRampToValueAtTime(0.10, a.currentTime + 0.04);

        padOsc.connect(padFilter);
        padOsc2.connect(padFilter);
        padFilter.connect(padGain).connect(a.destination);

        padOsc.start();
        padOsc2.start();
        padLfo.start();
        padOsc._sibling = padOsc2;
      }
      function stopPad(release = 0.12) {
        if (!padOsc) return;
        const a = audio();
        try {
          padGain.gain.cancelScheduledValues(a.currentTime);
          padGain.gain.setValueAtTime(padGain.gain.value, a.currentTime);
          padGain.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + release);
          padOsc.stop(a.currentTime + release + 0.05);
          padOsc._sibling.stop(a.currentTime + release + 0.05);
          padLfo.stop(a.currentTime + release + 0.05);
        } catch (e) {}
        padOsc = padGain = padFilter = padLfo = null;
      }

      // release arpeggio scaled by hold duration
      function releaseArp(heldMs) {
        const base = 392; // G4
        const scale = [1, 5/4, 3/2, 15/8, 2, 5/2, 3]; // major-ish ascending
        const steps = Math.max(2, Math.min(7, 2 + Math.floor(heldMs / 180)));
        const a = audio();
        for (let i = 0; i < steps; i++) {
          const t = a.currentTime + i * 0.06;
          blip(base * scale[i],     0.28, 'triangle', 0.14, t);
          blip(base * scale[i] * 2, 0.18, 'sine',     0.05, t);
        }
      }

      // ───── Canvas animation system ──────────────────────────
      const ripples = [];
      const particles = [];
      const flashes = []; // brief screen tints

      const hold = { active: false, t0: 0, hue: 270 };

      function addRipple(x, y, hue, intensity) {
        ripples.push({
          x, y, hue,
          r0: 12,
          rMax: 320 + 60 * (intensity - 1),
          born: performance.now(),
          life: 720 + 140 * (intensity - 1),
          intensity,
        });
      }

      function addParticles(x, y, dx, dy, hue, count, spread) {
        const angle = Math.atan2(dy, dx);
        const isOmni = (dx === 0 && dy === 0);
        for (let i = 0; i < count; i++) {
          const a = isOmni ? Math.random() * Math.PI * 2
                           : angle + (Math.random() - 0.5) * spread;
          const speed = 130 + Math.random() * 240;
          particles.push({
            x: x + (Math.random() - 0.5) * 12,
            y: y + (Math.random() - 0.5) * 12,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed,
            hue: hue + (Math.random() - 0.5) * 30,
            born: performance.now(),
            life: 600 + Math.random() * 500,
            size: 1.6 + Math.random() * 3.2,
          });
        }
      }

      function addFlash(hue, intensity) {
        flashes.push({
          hue,
          born: performance.now(),
          life: 240,
          intensity,
        });
      }

      let lastFrame = performance.now();
      function frame() {
        const now = performance.now();
        const dt = Math.min(0.05, (now - lastFrame) / 1000);
        lastFrame = now;

        // trail fade (slight tint toward bg)
        ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
        ctx.fillRect(0, 0, 600, 600);

        // ambient subtle vignette
        const vg = ctx.createRadialGradient(300, 300, 200, 300, 300, 380);
        vg.addColorStop(0, 'rgba(0,0,0,0)');
        vg.addColorStop(1, 'rgba(0,0,0,0.35)');
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, 600, 600);

        // hold glow (Enter held)
        if (hold.active) {
          const heldFor = (now - hold.t0) / 1000;
          const intensity = Math.min(heldFor, 2) / 2; // 0..1 over 2s
          const pulse = Math.sin(now / 90) * 6;
          const r = 90 + intensity * 220 + pulse;
          const grad = ctx.createRadialGradient(300, 300, 0, 300, 300, r);
          grad.addColorStop(0,   `hsla(${hold.hue}, 85%, 65%, ${0.42 + intensity * 0.35})`);
          grad.addColorStop(0.4, `hsla(${hold.hue}, 85%, 55%, ${0.18 + intensity * 0.20})`);
          grad.addColorStop(1,   `hsla(${hold.hue}, 85%, 50%, 0)`);
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, 600, 600);

          // breathing ring
          ctx.beginPath();
          ctx.arc(300, 300, 130 + intensity * 80 + pulse * 0.5, 0, Math.PI * 2);
          ctx.strokeStyle = `hsla(${hold.hue}, 90%, 75%, ${0.5 + intensity * 0.3})`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        // ripples
        for (let i = ripples.length - 1; i >= 0; i--) {
          const r = ripples[i];
          const t = (now - r.born) / r.life;
          if (t >= 1) { ripples.splice(i, 1); continue; }
          const ease = 1 - Math.pow(1 - t, 3);
          const radius = r.r0 + (r.rMax - r.r0) * ease;
          const alpha = (1 - t) * 0.95;

          ctx.beginPath();
          ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
          ctx.strokeStyle = `hsla(${r.hue}, 85%, 65%, ${alpha})`;
          ctx.lineWidth = 3 * (1 - t * 0.4);
          ctx.stroke();

          if (r.intensity >= 2) {
            ctx.beginPath();
            ctx.arc(r.x, r.y, radius * 0.72, 0, Math.PI * 2);
            ctx.strokeStyle = `hsla(${r.hue}, 95%, 78%, ${alpha * 0.55})`;
            ctx.lineWidth = 1.6;
            ctx.stroke();
          }
          if (r.intensity >= 3) {
            ctx.beginPath();
            ctx.arc(r.x, r.y, radius * 0.5, 0, Math.PI * 2);
            ctx.strokeStyle = `hsla(${r.hue + 25}, 100%, 82%, ${alpha * 0.45})`;
            ctx.lineWidth = 1.2;
            ctx.stroke();
          }
        }

        // particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          const t = (now - p.born) / p.life;
          if (t >= 1) { particles.splice(i, 1); continue; }
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vx *= 0.955;
          p.vy *= 0.955;
          const alpha = (1 - t) * 0.95;
          const size = p.size * (1 - t * 0.4);
          ctx.beginPath();
          ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${p.hue}, 85%, 70%, ${alpha})`;
          ctx.fill();
        }

        // flashes (brief tint over full frame)
        for (let i = flashes.length - 1; i >= 0; i--) {
          const f = flashes[i];
          const t = (now - f.born) / f.life;
          if (t >= 1) { flashes.splice(i, 1); continue; }
          const alpha = (1 - t) * 0.18 * f.intensity;
          ctx.fillStyle = `hsla(${f.hue}, 85%, 60%, ${alpha})`;
          ctx.fillRect(0, 0, 600, 600);
        }

        // hold meta stays static (no live timer)
        if (hold.active && !metaEl.dataset.holding) {
          metaEl.innerHTML = `<span class="hold">▼ HOLDING</span>`;
          metaEl.dataset.holding = '1';
        }

        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);

      // ───── Visual triggers per event ────────────────────────
      function punch(scale) {
        keyEl.style.transform = `scale(${scale})`;
        setTimeout(() => { keyEl.style.transform = 'scale(1)'; }, 110);
      }

      function showKey(glyph, hue) {
        keyEl.classList.remove('idle');
        keyEl.textContent = glyph;
        keyEl.style.color = `hsl(${hue}, 85%, 70%)`;
      }

      function multiLabel(n) {
        if (n <= 1) return '&nbsp;';
        if (n === 2) return '<span class="multi">DOUBLE</span>';
        if (n === 3) return '<span class="multi">TRIPLE</span>';
        return `<span class="multi">×${n}</span>`;
      }

      function handleArrow(keyName) {
        const k = KEYS[keyName];
        const chain = tapChainFor(keyName);

        showKey(k.glyph, k.hue);
        punch(1 + 0.07 * Math.min(chain, 4));
        metaEl.innerHTML = multiLabel(chain);

        // audio: chord, deeper as chain grows
        chord(k.freq, chain);

        // visual: ripples + directional particles, stacked for chain
        const cx = 300, cy = 300;
        for (let i = 0; i < chain; i++) {
          setTimeout(() => {
            addRipple(cx, cy, k.hue, chain);
            addParticles(cx, cy, k.dx, k.dy, k.hue, 14 + chain * 6, k.dx || k.dy ? 0.7 : 6.28);
          }, i * 70);
        }

        if (chain >= 2) addFlash(k.hue, chain - 1);
      }

      function handleEnterDown() {
        const k = KEYS.Enter;
        showKey('⏎', k.hue);
        punch(1.08);
        hold.active = true;
        hold.t0 = performance.now();
        hold.hue = k.hue;
        metaEl.innerHTML = `<span class="hold">▼ HOLDING</span>`;
        metaEl.dataset.holding = '1';

        // audio: low thunk + start pad
        blip(110, 0.22, 'sine', 0.18);
        startPad(k.hue);

        // visual: gentle inward implosion ring
        ripples.push({
          x: 300, y: 300, hue: k.hue,
          r0: 240, rMax: 90,
          born: performance.now(), life: 360, intensity: 1,
        });
        addParticles(300, 300, 0, 0, k.hue, 18, 6.28);
      }

      function handleEnterUp(heldMs) {
        const k = KEYS.Enter;
        hold.active = false;

        // also feed Enter into chain detector for short presses
        let chain = 1;
        if (heldMs < 250) chain = tapChainFor('Enter');

        delete metaEl.dataset.holding;
        if (chain >= 2) {
          metaEl.innerHTML = multiLabel(chain);
        } else {
          metaEl.innerHTML = '&nbsp;';
        }
        punch(1.12 + Math.min(heldMs, 1500) / 12000);

        // audio
        stopPad(0.12);
        releaseArp(heldMs);

        // visual: expanding ring(s) scaled by hold, omnidirectional burst
        const power = 1 + Math.min(heldMs / 500, 3);
        addRipple(300, 300, k.hue,      power);
        addRipple(300, 300, k.hue + 25, power);
        if (chain >= 2) addRipple(300, 300, k.hue - 25, power);

        const burst = 28 + Math.floor(Math.min(heldMs, 2000) / 50);
        for (let i = 0; i < burst; i++) {
          const a = (i / burst) * Math.PI * 2;
          const speed = 160 + Math.random() * 180 + Math.min(heldMs, 1500) / 10;
          particles.push({
            x: 300, y: 300,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed,
            hue: k.hue + (Math.random() - 0.5) * 50,
            born: performance.now(),
            life: 750 + Math.random() * 450,
            size: 1.8 + Math.random() * 3,
          });
        }
        addFlash(k.hue, Math.min(power, 3));
      }

      // ───── Idle fade-back ───────────────────────────────────
      let idleTimer = null;
      function armIdle() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
          if (hold.active) return;
          keyEl.classList.add('idle');
          keyEl.textContent = 'arrows · enter';
          keyEl.style.color = '';
          metaEl.innerHTML = '&nbsp;';
        }, 2200);
      }

      // ───── Input wiring ─────────────────────────────────────
      let enterDownAt = 0;

      function onKeyDown(e) {
        if (!(e.key in KEYS)) return;
        e.preventDefault();
        audio(); // unlock on first input

        if (e.key === 'Enter') {
          if (e.repeat) return;
          enterDownAt = performance.now();
          handleEnterDown();
          return;
        }

        if (e.repeat) return; // ignore arrow auto-repeat
        handleArrow(e.key);
        armIdle();
      }

      function onKeyUp(e) {
        if (e.key !== 'Enter') return;
        if (!enterDownAt) return;
        e.preventDefault();
        const held = performance.now() - enterDownAt;
        enterDownAt = 0;
        handleEnterUp(held);
        armIdle();
      }

      window.addEventListener('keydown', onKeyDown, true);
      window.addEventListener('keyup',   onKeyUp,   true);
    })();
  </script>
</body>
</html>
