<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>Comfortable Thumb.</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
<script defer src="https://cloud.umami.is/script.js" data-website-id="be32beae-a2a9-423f-b55d-e646ec260f93"></script>
</head>
<body>
<div id="app">

  <!-- Rainbow particle canvas — black void, lights up only when playing -->
  <canvas id="particles" width="600" height="600"></canvas>

  <main class="panel">

    <header class="hdr">
      <!-- Prism: light enters left, refracts to spectrum on right -->
      <svg class="prism" viewBox="0 0 64 28" aria-hidden="true">
        <defs>
          <linearGradient id="spec" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#ff4a5b"/>
            <stop offset="20%"  stop-color="#ffa64a"/>
            <stop offset="40%"  stop-color="#ffe24a"/>
            <stop offset="60%"  stop-color="#57e08a"/>
            <stop offset="80%"  stop-color="#4ad9ff"/>
            <stop offset="100%" stop-color="#a96cff"/>
          </linearGradient>
        </defs>
        <line x1="0" y1="14" x2="22" y2="14" stroke="#fff8dc" stroke-width="0.8" opacity="0.75"/>
        <polygon points="22,4 22,24 38,14" fill="none" stroke="#f5efe0" stroke-width="0.9" opacity="0.9"/>
        <line x1="38" y1="14" x2="64" y2="4"  stroke="url(#spec)" stroke-width="0.7"/>
        <line x1="38" y1="14" x2="64" y2="9"  stroke="url(#spec)" stroke-width="0.7"/>
        <line x1="38" y1="14" x2="64" y2="14" stroke="url(#spec)" stroke-width="0.7"/>
        <line x1="38" y1="14" x2="64" y2="19" stroke="url(#spec)" stroke-width="0.7"/>
        <line x1="38" y1="14" x2="64" y2="24" stroke="url(#spec)" stroke-width="0.7"/>
      </svg>

      <div class="hdr-sub">PENTATONIC SOLO</div>
      <div class="hdr-main" data-text="Comfortable Thumb.">Comfortable Thumb.</div>
    </header>

    <!-- spotlight stage with the ringing note -->
    <section class="stage">
      <div class="spot"></div>
      <div class="now-note" id="now-note" data-text="—">—</div>
      <div class="now-sub" id="now-sub">SILENT</div>
      <canvas class="scope" id="scope" width="540" height="80"></canvas>
    </section>

    <!-- 5-pad d-pad layout -->
    <section class="pads">
      <div class="pad-grid">
        <button class="pad pad-up focusable" data-key="up" aria-label="Up arrow">
          <span class="pad-arrow">▲</span>
          <span class="pad-note" data-slot="up">E</span>
          <span class="pad-deg">4</span>
        </button>
        <button class="pad pad-left focusable" data-key="left" aria-label="Left arrow">
          <span class="pad-arrow">◀</span>
          <span class="pad-note" data-slot="left">D</span>
          <span class="pad-deg">b3</span>
        </button>
        <button class="pad pad-enter focusable" data-key="enter" aria-label="Enter">
          <span class="pad-arrow">●</span>
          <span class="pad-note" data-slot="enter">A</span>
          <span class="pad-deg">b7</span>
        </button>
        <button class="pad pad-right focusable" data-key="right" aria-label="Right arrow">
          <span class="pad-arrow">▶</span>
          <span class="pad-note" data-slot="right">F#</span>
          <span class="pad-deg">5</span>
        </button>
        <button class="pad pad-down focusable" data-key="down" aria-label="Down arrow">
          <span class="pad-arrow">▼</span>
          <span class="pad-note" data-slot="down">B</span>
          <span class="pad-deg">1</span>
        </button>
      </div>
    </section>

  </main>

</div>
<script src="app.js"></script>
</body>
</html>
